function generateCard() {
  const name = document.getElementById('name').value.trim();
  if (!name) {
    alert('请输入学员姓名');
    return;
  }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // 9:16 尺寸
  const w = 1080;
  const h = 1920;
  canvas.width = w;
  canvas.height = h;

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    // 画背景
    ctx.drawImage(img, 0, 0, w, h);

    // 文字样式
    ctx.fillStyle = '#000';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    // 主文字
    const text1 = `尊敬的 ${name} 学员：`;
    const text2 = '　　您好！';
    const text3 = '　　祝贺您成为焦作市老干部大学学员！';
    const text4 = '　　愿您在焦作市老干部大学的课堂上，收获新知、结交挚友、乐享晚年，让退休生活更加丰富多彩、充实美好！期待与您在校园相聚！';

    const fontSize = 45;
    ctx.font = `${fontSize}px "国标楷体"`;
    const lineHeight = fontSize * 1.8;

    // 整体居中区域
    const boxW = w * 0.8;
    const x = (w - boxW) / 2;
let y = (h - 8 * lineHeight) / 2;

    ctx.fillText(text1, x, y);
    y += lineHeight;
    ctx.fillText(text2, x, y);
    y += lineHeight;
    ctx.fillText(text3, x, y);
    y += lineHeight;
    wrapText(ctx, text4, x, y, boxW, lineHeight);

    canvas.style.display = 'block';
    document.getElementById('downloadBtn').style.display = 'inline-block';
  };
  img.src = bgBase64;
}

// 自动换行
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split('');
  let line = '';
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i];
    const metrics = ctx.measureText(test);
    if (metrics.width > maxWidth && i > 0) {
      ctx.fillText(line, x, y);
      line = words[i];
      y += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}

// 下载
function downloadImage() {
  const canvas = document.getElementById('canvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = '老干部大学录取通知书.png';
  a.click();
}
